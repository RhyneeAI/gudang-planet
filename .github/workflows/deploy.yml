name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
      migrate:
        description: 'Run migrations?'
        required: true
        default: true
        type: boolean
      optimize:
        description: 'Cache config/route/view?'
        required: true
        default: false
        type: boolean

env:
  SSH_USER: ${{ vars.SSH_USER }}
  SSH_HOST: ${{ vars.SSH_HOST }}
  SSH_PORT: ${{ vars.SSH_PORT || '22' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts

      - name: Execute deploy
        run: |
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST << 'ENDSSH'
            set -e

            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            if [ "${{ github.event.inputs.environment }}" = "production" ]; then
              DEPLOY_PATH="${{ vars.DEPLOY_PATH_PRODUCTION }}"
            fi

            cd "$DEPLOY_PATH"

            git fetch origin
            git checkout ${{ github.event.inputs.branch }}
            git pull origin ${{ github.event.inputs.branch }}

            # PHP version
            PHP_BIN="${{ vars.PHP_BIN || 'php' }}"
            COMPOSER_BIN="${{ vars.COMPOSER_BIN || 'composer' }}"

            $COMPOSER_BIN install --no-dev --optimize-autoloader

            if [ "${{ github.event.inputs.migrate }}" = "true" ]; then
              $PHP_BIN artisan migrate --force
            fi

            if [ "${{ github.event.inputs.optimize }}" = "true" ]; then
              $PHP_BIN artisan config:cache
              $PHP_BIN artisan route:cache
              $PHP_BIN artisan view:cache
            else
              $PHP_BIN artisan config:clear
              $PHP_BIN artisan route:clear
              $PHP_BIN artisan view:clear
            fi

            $PHP_BIN artisan queue:restart || true

            echo "Deploy to ${{ github.event.inputs.environment }} complete"
          ENDSSH
